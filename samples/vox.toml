# Annotated reference of EVERY vox config key. Each has an identically-named CLI flag
# that OVERRIDES it (precedence: flag > this file > built-in default). Run: `vox vox.toml`.
# This example is a full-duplex peer; edit `peer` and run a mirror on the other
# machine pointing back at this one.
#
# For a concrete two-machine setup, see the scenario configs `host.toml` (Apollo
# Windows host, VB-Cable A/B) and `client.toml` (real mic + headphones).

# --- Connection ---
peer = "192.168.1.50"   # send target, host[:port]. Port omitted -> 9680.
bind = 9680             # local UDP receive port (only needed when receiving).

# --- Devices (role names; "none" | "default" | "exact device name") ---
capture  = "default"    # local record device. "none" = receive-only.
playback = "default"    # local play device.   "none" = send-only.

# --- Device properties ---
# Device sample rate, Hz. Omit to auto-pick: 48 kHz when the device supports it
# (no resampling), else the device's native rate (vox resamples to/from 48 kHz).
# Set a value only to force a specific device rate.
# capture_sample_rate  = 48000
# playback_sample_rate = 48000
# Channel count per device. Omit to auto-negotiate (mono if the device supports it,
# else stereo — e.g. VB-Cable is stereo-only). Set 1 or 2 to force.
# capture_channels  = 1
# playback_channels = 1

# --- Codec / send-path (encoder only) ---
bitrate       = 24000   # Opus target bits/s (voice-grade).
fec           = false   # in-band FEC (default off): costs quality + jitter; enable
                        # only on genuinely lossy links.
expected_loss = 10      # % loss to tune FEC for (~5-10%). Only used when fec = true.
dtx           = false   # discontinuous transmission (silence suppression).

# --- Receive-path ---
jitter_ms = 150         # MAX jitter-buffer depth; vox adapts below it to measured jitter.
# drift_correct = false # smooth clock-drift compensation (off by default). Enable if
                        # the TUI's "drift" reads persistently nonzero; costs a little
                        # latency/CPU (puts a resampler on the receive path).
